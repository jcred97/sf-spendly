<template>
    <div class="chart-panel slds-box slds-theme_default">
        <h3 class="panel-title">{title}</h3>
        <template lwc:if={hasData}>
            <div class="chart-bars">
                <template for:each={chartData} for:item="item">
                    <div key={item.key} class="bar-row">
                        <div class="bar-label" title={item.name}>{item.name}</div>
                        <div class="bar-track">
                            <div class="bar-fill" style={item.barStyle}></div>
                        </div>
                        <div class="bar-amount">{item.formattedTotal}</div>
                    </div>
                </template>
            </div>
        </template>
        <template lwc:else>
            <div class="no-data-msg slds-box slds-theme_default">
                <lightning-icon icon-name="utility:chart" size="small"></lightning-icon>
                <span>{emptyMessage}</span>
            </div>
        </template>
    </div>
</template>
