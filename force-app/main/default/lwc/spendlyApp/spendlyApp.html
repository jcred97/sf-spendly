<template>
    <lightning-card title="Spendly" icon-name="custom:custom63">
        <div class="slds-p-around_medium">

            <!-- Filters -->
            <div class="slds-grid slds-gutters slds-wrap slds-m-bottom_medium">
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-5 slds-p-around_x-small">
                    <lightning-input
                        class="date-format-hide"
                        type="date"
                        label="Start Date"
                        value={startDate}
                        onchange={handleChange}
                        data-field="startDate">
                    </lightning-input>
                </div>

                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-5 slds-p-around_x-small">
                    <lightning-input
                        class="date-format-hide"
                        type="date"
                        label="End Date"
                        value={endDate}
                        onchange={handleChange}
                        data-field="endDate">
                    </lightning-input>
                </div>

                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-5 slds-p-around_x-small">
                    <lightning-combobox
                        label="Spending"
                        value={spendingId}
                        options={spendingOptions}
                        onchange={handleChange}
                        data-field="spendingId">
                    </lightning-combobox>
                </div>

                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-5 slds-p-around_x-small">
                    <lightning-combobox
                        label="Category"
                        value={categoryId}
                        options={categoryOptions}
                        onchange={handleChange}
                        data-field="categoryId">
                    </lightning-combobox>
                </div>
            </div>

            <!-- Date Validation Error -->
            <template if:true={dateError}>
                <div class="slds-text-color_error slds-m-bottom_small slds-p-left_x-small">
                    {dateError}
                </div>
            </template>

            <!-- Table -->
            <template if:false={hasNoRows}>
                <div class="slds-m-top_medium" style="height: 500px">
                    <lightning-datatable
                        key-field="id"
                        data={rowsToDisplay}
                        columns={columns}
                        sorted-by={sortedBy}
                        sorted-direction={sortedDirection}
                        onsort={handleSort}
                        onrowaction={handleRowAction}
                        enable-infinite-loading
                        onloadmore={handleLoadMore}
                        is-loading={isLoading}
                        hide-checkbox-column>
                    </lightning-datatable>
                </div>

                <!-- Total -->
                <div class="slds-grid slds-m-top_small slds-p-horizontal_small">
                    <div class="slds-col slds-text-align_right">
                        <strong>Total: {formattedTotal}</strong>
                    </div>
                </div>
            </template>

            <!-- Empty State -->
            <template if:true={hasNoRows}>
                <div class="empty-state slds-m-top_medium slds-p-around_large slds-text-align_center">
                    <lightning-icon icon-name="utility:sentiment_neutral" size="large" class="slds-m-bottom_small"></lightning-icon>
                    <p class="slds-text-heading_small slds-m-top_small">No expenses found</p>
                    <p class="slds-text-body_regular slds-text-color_weak">Try adjusting your filters or add a new expense.</p>
                </div>
            </template>

            <!-- Add Expense Button -->
            <div class="slds-align_absolute-center slds-m-top_medium">
                <lightning-button
                    variant="brand"
                    label="Add Expense"
                    onclick={openModal}>
                </lightning-button>
            </div>
        </div>
    </lightning-card>

    <!-- Extracted Modal Component -->
    <c-spendly-expense-modal
        is-open={isModalOpen}
        record-id={editRecordId}
        onsuccess={handleSuccess}
        onclose={handleModalClose}>
    </c-spendly-expense-modal>
</template>
