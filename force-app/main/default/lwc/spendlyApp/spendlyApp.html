<template>
    <div class="spendly-page">

        <!-- Top Bar -->
        <div class="top-bar">
            <div class="top-bar-left">
                <lightning-icon icon-name="custom:custom63" size="small"></lightning-icon>
                <span class="top-bar-title">Spendly</span>
            </div>
            <div class="top-bar-right">
                <lightning-button
                    variant="neutral"
                    label="Export CSV"
                    icon-name="utility:download"
                    onclick={handleExportCsv}
                    disabled={hasNoRows}>
                </lightning-button>
                <lightning-button
                    variant="brand"
                    label="Add Expense"
                    icon-name="utility:add"
                    onclick={openModal}>
                </lightning-button>
            </div>
        </div>

        <!-- Filters -->
        <div class="filters-panel">
            <div class="slds-grid slds-gutters_small slds-wrap slds-grid_vertical-align-end">
                <div class="slds-col filter-col">
                    <lightning-input
                        class="date-format-hide"
                        type="date"
                        label="Start Date"
                        value={startDate}
                        onchange={handleChange}
                        data-field="startDate">
                    </lightning-input>
                </div>
                <div class="slds-col filter-col">
                    <lightning-input
                        class="date-format-hide"
                        type="date"
                        label="End Date"
                        value={endDate}
                        onchange={handleChange}
                        data-field="endDate">
                    </lightning-input>
                </div>
                <div class="slds-col filter-col">
                    <lightning-combobox
                        label="Spending"
                        value={spendingId}
                        options={spendingOptions}
                        onchange={handleChange}
                        data-field="spendingId">
                    </lightning-combobox>
                </div>
                <div class="slds-col filter-col">
                    <lightning-combobox
                        label="Category"
                        value={categoryId}
                        options={categoryOptions}
                        onchange={handleChange}
                        data-field="categoryId">
                    </lightning-combobox>
                </div>
            </div>
            <template lwc:if={dateError}>
                <div class="slds-text-color_error slds-m-top_x-small">{dateError}</div>
            </template>
        </div>

        <!-- Summary Cards -->
        <div class="summary-row">
            <div class="stat-card">
                <div class="stat-label">Total Spent</div>
                <div class="stat-value">{formattedTotal}</div>
                <div class="stat-sub">{expenseCount} transactions</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Average</div>
                <div class="stat-value">{averageExpense}</div>
                <div class="stat-sub">per transaction</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Top Category</div>
                <div class="stat-value stat-value_name">{topCategory.name}</div>
                <div class="stat-sub">{topCategory.amount}</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Top Bank</div>
                <div class="stat-value stat-value_name">{topBank.name}</div>
                <div class="stat-sub">{topBank.count} transactions</div>
            </div>
        </div>

        <!-- Main Content: Chart + Table -->
        <div class="main-row">

            <!-- Chart -->
            <div class="chart-panel">
                <div class="panel-title">Spending by Category</div>
                <template lwc:if={hasChartData}>
                    <div class="chart-bars">
                        <template for:each={categoryChartData} for:item="item">
                            <div key={item.key} class="bar-row">
                                <div class="bar-label" title={item.name}>{item.name}</div>
                                <div class="bar-track">
                                    <div class="bar-fill" style={item.barStyle}></div>
                                </div>
                                <div class="bar-amount">{item.formattedTotal}</div>
                            </div>
                        </template>
                    </div>
                </template>
                <template lwc:else>
                    <div class="no-data-msg">No data for current filters</div>
                </template>
            </div>

            <!-- Table -->
            <div class="table-panel">
                <template lwc:if={hasNoRows}>
                    <div class="empty-state">
                        <lightning-icon icon-name="utility:sentiment_neutral" size="large" class="slds-m-bottom_small"></lightning-icon>
                        <p class="slds-text-heading_small slds-m-top_small">No expenses found</p>
                        <p class="slds-text-body_regular slds-text-color_weak">Try adjusting your filters or add a new expense.</p>
                    </div>
                </template>
                <template lwc:else>
                    <div class="table-wrap">
                        <lightning-datatable
                            key-field="id"
                            data={rowsToDisplay}
                            columns={columns}
                            sorted-by={sortedBy}
                            sorted-direction={sortedDirection}
                            onsort={handleSort}
                            onrowaction={handleRowAction}
                            enable-infinite-loading
                            onloadmore={handleLoadMore}
                            is-loading={isLoading}
                            hide-checkbox-column>
                        </lightning-datatable>
                    </div>
                    <div class="table-footer">
                        <strong>Total: {formattedTotal}</strong>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <c-spendly-expense-modal
        is-open={isModalOpen}
        record-id={editRecordId}
        onsuccess={handleSuccess}
        onclose={handleModalClose}>
    </c-spendly-expense-modal>
</template>
