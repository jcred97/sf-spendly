<template>
    <div class="spendly-page">
        <div class={workspaceShellClass}>
            <aside class="workspace-sidebar" aria-label="Spendly workspace">
                <div class="sidebar-brand">
                    <span class="brand-mark">
                        <lightning-icon icon-name="utility:money" size="x-small"></lightning-icon>
                    </span>
                    <div class="brand-copy">
                        <span class="brand-name">Spendly</span>
                        <span class="brand-caption">{selectedExpenseGroupName}</span>
                    </div>
                    <button
                        class="sidebar-toggle"
                        type="button"
                        title={sidebarToggleTitle}
                        aria-label={sidebarToggleTitle}
                        aria-expanded={sidebarAriaExpanded}
                        onclick={handleSidebarToggle}>
                        <lightning-icon icon-name={sidebarToggleIcon} size="xx-small"></lightning-icon>
                    </button>
                </div>

                <div class="workspace-context">
                    <lightning-combobox
                        label="Expense Group"
                        value={expenseGroupId}
                        options={expenseGroupOptions}
                        variant="label-hidden"
                        onchange={handleWorkspaceGroupChange}>
                    </lightning-combobox>
                    <span class="context-caption">Current group</span>
                </div>

                <nav class="workspace-nav" aria-label="Spendly views">
                    <template for:each={workspaceNavItems} for:item="item">
                        <button
                            key={item.key}
                            class={item.className}
                            data-view={item.key}
                            aria-current={item.ariaCurrent}
                            title={item.label}
                            onclick={handleViewChange}>
                            <lightning-icon icon-name={item.iconName} size="x-small"></lightning-icon>
                            <span>{item.label}</span>
                        </button>
                    </template>
                </nav>
            </aside>

            <main class="workspace-main">
                <template lwc:if={isDashboardView}>
                    <section class="workspace-view">
                        <div class="view-header">
                            <div>
                                <h2>{viewTitle}</h2>
                                <p>{viewSubtitle}</p>
                            </div>
                            <div class="view-header-actions">
                                <div class="dashboard-month-controls" aria-label="Dashboard month">
                                    <lightning-button-icon
                                        icon-name="utility:chevronleft"
                                        alternative-text="Previous month"
                                        title="Previous month"
                                        variant="border-filled"
                                        onclick={handlePreviousMonth}>
                                    </lightning-button-icon>
                                    <span>{selectedMonthLabel}</span>
                                    <lightning-button-icon
                                        icon-name="utility:chevronright"
                                        alternative-text="Next month"
                                        title="Next month"
                                        variant="border-filled"
                                        onclick={handleNextMonth}>
                                    </lightning-button-icon>
                                </div>
                                <lightning-button
                                    variant="brand"
                                    label="Add Expense"
                                    icon-name="utility:add"
                                    onclick={openModal}>
                                </lightning-button>
                            </div>
                        </div>

                        <section class="dashboard-hero slds-box slds-theme_default" aria-label="Monthly spending summary">
                            <div>
                                <p class="eyebrow">Current view</p>
                                <h3>{dashboardTitle}</h3>
                                <p>{dashboardSubtitle}</p>
                            </div>
                            <div class="dashboard-hero-actions">
                                <div class="dashboard-hero-total">
                                    <span>Total spent</span>
                                    <strong>{formattedTotal}</strong>
                                    <small>{transactionCountLabel}</small>
                                </div>
                            </div>
                        </section>

                        <template lwc:if={isDashboardLoading}>
                            <section class="dashboard-loading slds-box slds-theme_default" aria-busy="true">
                                <lightning-spinner alternative-text="Loading dashboard" size="small"></lightning-spinner>
                            </section>
                        </template>
                        <template lwc:else>
                            <template lwc:if={showDashboardEmptyState}>
                                <section class="dashboard-empty-callout slds-box slds-theme_default">
                                    <div class="slds-media">
                                        <div class="slds-media__figure">
                                            <lightning-icon icon-name="utility:info" size="small"></lightning-icon>
                                        </div>
                                        <div class="slds-media__body">
                                            <h3>No expenses in this period</h3>
                                            <p>Add an expense or move to another month to see dashboard activity.</p>
                                        </div>
                                    </div>
                                </section>
                            </template>

                            <c-spendly-summary-cards
                                formatted-total={formattedTotal}
                                expense-count={expenseCount}
                                average-expense={averageExpense}
                                top-category-name={topCategory.name}
                                top-category-amount={topCategory.amount}
                                top-bank-name={topBank.name}
                                top-bank-count={topBank.count}>
                            </c-spendly-summary-cards>

                            <div class="charts-row">
                                <c-spendly-bar-chart
                                    title="By Category"
                                    chart-data={categoryChartData}
                                    empty-message="No category spending in this period">
                                </c-spendly-bar-chart>

                                <c-spendly-trend-chart
                                    title="Monthly Trend"
                                    trend-data={monthlyTrendData}
                                    empty-message="No trend data for the selected months">
                                </c-spendly-trend-chart>

                                <c-spendly-bar-chart
                                    title="By Bank"
                                    chart-data={bankChartData}
                                    empty-message="No bank spending in this period">
                                </c-spendly-bar-chart>
                            </div>

                            <div class="dashboard-detail-grid">
                                <section class="dashboard-panel slds-box slds-theme_default slds-p-around_none">
                                    <div class="dashboard-panel-header">
                                        <div>
                                            <p class="eyebrow">Recent activity</p>
                                            <h3>Latest expenses</h3>
                                        </div>
                                        <button
                                            class="slds-button slds-button_reset slds-text-link"
                                            type="button"
                                            data-view="transactions"
                                            onclick={handleViewChange}>
                                            View all
                                        </button>
                                    </div>

                                    <template lwc:if={hasRecentDashboardRows}>
                                        <div class="dashboard-transaction-list">
                                            <template for:each={recentDashboardRows} for:item="row">
                                                <article key={row.id} class="dashboard-transaction-row">
                                                    <div>
                                                        <a href={row.recordLink} target="_blank" rel="noopener noreferrer">{row.name}</a>
                                                        <p>{row.metaLine}</p>
                                                    </div>
                                                    <div>
                                                        <strong>{row.amountFormatted}</strong>
                                                        <span>{row.transactionTimeDisplay} / {row.expenseDateFormatted}</span>
                                                    </div>
                                                </article>
                                            </template>
                                        </div>
                                    </template>
                                    <template lwc:else>
                                        <div class="dashboard-panel-empty">
                                            <lightning-icon icon-name="utility:table" size="small"></lightning-icon>
                                            <span>No latest expenses to show.</span>
                                        </div>
                                    </template>
                                </section>

                                <section class="dashboard-panel slds-box slds-theme_default slds-p-around_none">
                                    <div class="dashboard-panel-header">
                                        <div>
                                            <p class="eyebrow">Patterns</p>
                                            <h3>Spending insights</h3>
                                        </div>
                                    </div>

                                    <template lwc:if={showDashboardEmptyState}>
                                        <div class="dashboard-panel-empty">
                                            <lightning-icon icon-name="utility:metrics" size="small"></lightning-icon>
                                            <span>Insights appear after expenses are added.</span>
                                        </div>
                                    </template>
                                    <template lwc:else>
                                        <div class="insight-grid">
                                            <template for:each={dashboardInsights} for:item="insight">
                                                <div key={insight.key} class="insight-card">
                                                    <lightning-icon icon-name={insight.iconName} size="x-small"></lightning-icon>
                                                    <span>{insight.label}</span>
                                                    <strong>{insight.value}</strong>
                                                    <small>{insight.detail}</small>
                                                </div>
                                            </template>
                                        </div>
                                    </template>
                                </section>
                            </div>
                        </template>
                    </section>
                </template>

                <template lwc:elseif={isTransactionsView}>
                    <section class="workspace-view">
                        <div class="view-header">
                            <div>
                                <h2>{viewTitle}</h2>
                                <p>{viewSubtitle}</p>
                            </div>
                            <div class="view-header-actions">
                                <div class="dashboard-month-controls" aria-label="Transaction month">
                                    <lightning-button-icon
                                        icon-name="utility:chevronleft"
                                        alternative-text="Previous month"
                                        title="Previous month"
                                        variant="border-filled"
                                        onclick={handlePreviousMonth}>
                                    </lightning-button-icon>
                                    <span>{selectedMonthLabel}</span>
                                    <lightning-button-icon
                                        icon-name="utility:chevronright"
                                        alternative-text="Next month"
                                        title="Next month"
                                        variant="border-filled"
                                        onclick={handleNextMonth}>
                                    </lightning-button-icon>
                                </div>
                                <lightning-button
                                    variant="neutral"
                                    label="Export CSV"
                                    icon-name="utility:download"
                                    onclick={handleExportCsv}
                                    disabled={hasNoRows}>
                                </lightning-button>
                                <lightning-button
                                    variant="neutral"
                                    label="Print / PDF"
                                    icon-name="utility:print"
                                    onclick={handlePrint}
                                    disabled={hasNoRows}>
                                </lightning-button>
                                <lightning-button
                                    variant="brand"
                                    label="Add Expense"
                                    icon-name="utility:add"
                                    onclick={openModal}>
                                </lightning-button>
                            </div>
                        </div>

                        <div class="transactions-layout">
                            <aside class="transaction-filters" aria-label="Expense filters">
                                <div class="panel-title-row">
                                    <lightning-icon icon-name="utility:filterList" size="x-small"></lightning-icon>
                                    <h3>Filter</h3>
                                </div>

                                <lightning-input
                                    type="search"
                                    label="Search"
                                    placeholder="Name, category, group, bank..."
                                    value={searchTerm}
                                    onchange={handleSearch}>
                                </lightning-input>

                                <div class="filter-stack">
                                    <lightning-input
                                        class="date-format-hide"
                                        type="date"
                                        label="Start Date"
                                        value={startDate}
                                        onchange={handleChange}
                                        data-field="startDate">
                                    </lightning-input>
                                    <lightning-input
                                        class="date-format-hide"
                                        type="date"
                                        label="End Date"
                                        value={endDate}
                                        onchange={handleChange}
                                        data-field="endDate">
                                    </lightning-input>
                                    <lightning-combobox
                                        label="Category"
                                        value={categoryId}
                                        options={categoryOptions}
                                        onchange={handleChange}
                                        data-field="categoryId">
                                    </lightning-combobox>
                                </div>

                                <template lwc:if={dateError}>
                                    <div class="slds-text-color_error slds-m-top_x-small">{dateError}</div>
                                </template>

                                <lightning-button
                                    class="filter-reset"
                                    variant="neutral"
                                    label="Reset Filters"
                                    icon-name="utility:refresh"
                                    onclick={handleReset}>
                                </lightning-button>
                            </aside>

                            <div class="transactions-panel">
                                <div class="transactions-panel-header">
                                    <div>
                                        <p class="eyebrow">{transactionPeriodLabel}</p>
                                        <h3>{transactionCountLabel}</h3>
                                    </div>
                                    <div class="transactions-total">
                                        <span>Total</span>
                                        <strong>{formattedTotal}</strong>
                                    </div>
                                </div>

                                <div class="transaction-body">
                                    <template lwc:if={isExpensesLoading}>
                                        <section class="transactions-loading slds-box slds-theme_default" aria-busy="true">
                                            <lightning-spinner alternative-text="Loading expenses" size="small"></lightning-spinner>
                                        </section>
                                    </template>
                                    <template lwc:else>
                                        <template lwc:if={hasNoRows}>
                                            <div class="empty-state">
                                                <lightning-icon icon-name={expenseEmptyIcon} size="medium"></lightning-icon>
                                                <h3>{expenseEmptyTitle}</h3>
                                                <p>{expenseEmptyMessage}</p>
                                                <div class="empty-state-actions">
                                                    <template lwc:if={hasActiveExpenseFilters}>
                                                        <lightning-button
                                                            variant="neutral"
                                                            label="Reset Filters"
                                                            icon-name="utility:refresh"
                                                            onclick={handleReset}>
                                                        </lightning-button>
                                                    </template>
                                                    <template lwc:else>
                                                        <lightning-button
                                                            variant="brand"
                                                            label="Add Expense"
                                                            icon-name="utility:add"
                                                            onclick={openModal}>
                                                        </lightning-button>
                                                    </template>
                                                </div>
                                            </div>
                                        </template>
                                        <template lwc:else>
                                            <template lwc:if={hasSelectedRows}>
                                                <div class="selection-bar">
                                                    <span class="selection-count">{selectedCount} row(s) selected</span>
                                                    <lightning-button
                                                        variant="destructive-text"
                                                        label="Delete Selected"
                                                        icon-name="utility:delete"
                                                        onclick={handleBulkDelete}>
                                                    </lightning-button>
                                                </div>
                                            </template>
                                            <div class="transaction-scroll">
                                                <div class="transaction-list" aria-label="Expenses">
                                                    <template for:each={transactionGroups} for:item="group">
                                                        <section key={group.key} class="transaction-day">
                                                            <div class="transaction-day-header">
                                                                <div>
                                                                    <p class="transaction-day-label">{group.label}</p>
                                                                    <p class="transaction-day-count">{group.countLabel}</p>
                                                                </div>
                                                                <strong>{group.totalFormatted}</strong>
                                                            </div>

                                                            <div class="transaction-day-rows">
                                                                <template for:each={group.rows} for:item="row">
                                                                    <article key={row.id} class="transaction-row">
                                                                        <label class="transaction-select" title="Select expense">
                                                                            <input
                                                                                type="checkbox"
                                                                                data-id={row.id}
                                                                                checked={row.isSelected}
                                                                                onchange={handleTransactionSelect} />
                                                                        </label>

                                                                        <div class="transaction-main">
                                                                            <a class="transaction-name" href={row.recordLink} target="_blank" rel="noopener noreferrer">
                                                                                {row.name}
                                                                            </a>
                                                                            <div class="transaction-meta">
                                                                                <span>{row.categoryDisplay}</span>
                                                                                <span>{row.bankDisplay}</span>
                                                                                <span>{row.transactionTypeDisplay}</span>
                                                                            </div>
                                                                        </div>

                                                                        <div class="transaction-when">
                                                                            <span>{row.transactionTimeDisplay}</span>
                                                                            <span>{row.expenseDateFormatted}</span>
                                                                        </div>

                                                                        <div class="transaction-amount">
                                                                            {row.amountFormatted}
                                                                        </div>

                                                                        <div class="transaction-actions" aria-label="Expense actions">
                                                                            <lightning-button-menu
                                                                                alternative-text="Expense actions"
                                                                                icon-size="x-small"
                                                                                menu-alignment="right"
                                                                                variant="border-filled"
                                                                                data-id={row.id}
                                                                                onselect={handleTransactionAction}>
                                                                                <lightning-menu-item
                                                                                    value="edit"
                                                                                    label="Edit"
                                                                                    icon-name="utility:edit">
                                                                                </lightning-menu-item>
                                                                                <lightning-menu-item
                                                                                    value="duplicate"
                                                                                    label="Duplicate"
                                                                                    icon-name="utility:copy_to_clipboard">
                                                                                </lightning-menu-item>
                                                                                <lightning-menu-item
                                                                                    value="delete"
                                                                                    label="Delete"
                                                                                    icon-name="utility:delete">
                                                                                </lightning-menu-item>
                                                                            </lightning-button-menu>
                                                                        </div>
                                                                    </article>
                                                                </template>
                                                            </div>
                                                        </section>
                                                    </template>
                                                </div>
                                            </div>

                                            <div class="transaction-table-footer">
                                                <span class="table-status">{visibleRowsSummary}</span>
                                                <template lwc:if={hasMoreRows}>
                                                    <lightning-button
                                                        variant="neutral"
                                                        label={loadMoreLabel}
                                                        icon-name="utility:chevrondown"
                                                        onclick={handleLoadMore}
                                                        disabled={isLoadingMore}>
                                                    </lightning-button>
                                                </template>
                                            </div>
                                        </template>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </section>
                </template>

                <template lwc:elseif={isRecurringView}>
                    <section class="workspace-view">
                        <div class="view-header">
                            <div>
                                <h2>{viewTitle}</h2>
                                <p>{viewSubtitle}</p>
                            </div>
                            <div class="view-header-actions">
                                <lightning-button
                                    variant="brand"
                                    label={runRecurringLabel}
                                    icon-name="utility:play"
                                    onclick={handleRunRecurringExpenses}
                                    disabled={isRunRecurringDisabled}>
                                </lightning-button>
                            </div>
                        </div>

                        <div class="recurring-summary-grid">
                            <template for:each={recurringSummaryCards} for:item="card">
                                <section key={card.key} class="recurring-summary-card slds-box slds-theme_default">
                                    <div class="recurring-summary-icon">
                                        <lightning-icon icon-name={card.iconName} size="x-small"></lightning-icon>
                                    </div>
                                    <div class="recurring-summary-copy">
                                        <span>{card.label}</span>
                                        <strong title={card.valueTitle}>{card.value}</strong>
                                        <small title={card.detailTitle}>{card.detail}</small>
                                    </div>
                                </section>
                            </template>
                        </div>

                        <section class="recurring-panel slds-box slds-theme_default slds-p-around_none">
                            <div class="recurring-panel-header">
                                <div>
                                    <p class="eyebrow">Templates</p>
                                    <h3>{selectedExpenseGroupName}</h3>
                                </div>
                                <span class="recurring-count">{recurringCountLabel}</span>
                            </div>

                            <template lwc:if={isRecurringLoading}>
                                <div class="recurring-loading">
                                    <lightning-spinner alternative-text="Loading recurring expenses" size="small"></lightning-spinner>
                                </div>
                            </template>

                            <template lwc:elseif={hasRecurringRows}>
                                <div class="recurring-list">
                                    <template for:each={recurringRows} for:item="row">
                                        <article key={row.id} class={row.rowClass}>
                                            <div class="recurring-main">
                                                <div class="recurring-title-row">
                                                    <a href={row.recordLink} target="_blank" rel="noopener noreferrer">{row.name}</a>
                                                    <span class={row.statusClass}>{row.statusLabel}</span>
                                                    <template lwc:if={row.dueToday}>
                                                        <span class="recurring-due">Due</span>
                                                    </template>
                                                </div>
                                                <p class="recurring-meta">
                                                    <span>{row.categoryDisplay}</span>
                                                    <span>{row.expenseGroupDisplay}</span>
                                                    <span>{row.bankDisplay}</span>
                                                    <span>{row.transactionTypeDisplay}</span>
                                                </p>
                                            </div>

                                            <div class="recurring-schedule">
                                                <div>
                                                    <span>Frequency</span>
                                                    <strong>{row.frequency}</strong>
                                                </div>
                                                <div>
                                                    <span>Next run</span>
                                                    <strong>{row.nextRunDateFormatted}</strong>
                                                </div>
                                                <div>
                                                    <span>Amount</span>
                                                    <strong>{row.amountFormatted}</strong>
                                                </div>
                                                <div>
                                                    <span>Monthly est.</span>
                                                    <strong>{row.monthlyAmountFormatted}</strong>
                                                </div>
                                            </div>

                                            <div class="recurring-dates">
                                                <span class="recurring-date-label">Active window</span>
                                                <span>{row.startDateFormatted} - {row.endDateFormatted}</span>
                                            </div>

                                            <div class="recurring-actions">
                                                <lightning-button-menu
                                                    alternative-text="Recurring expense actions"
                                                    icon-size="x-small"
                                                    menu-alignment="right"
                                                    variant="border-filled"
                                                    data-id={row.id}
                                                    onselect={handleRecurringAction}>
                                                    <lightning-menu-item
                                                        value="edit"
                                                        label="Edit"
                                                        icon-name="utility:edit">
                                                    </lightning-menu-item>
                                                    <lightning-menu-item
                                                        value="deactivate"
                                                        label="Deactivate"
                                                        icon-name="utility:block_visitor"
                                                        disabled={row.deactivateDisabled}>
                                                    </lightning-menu-item>
                                                </lightning-button-menu>
                                            </div>
                                        </article>
                                    </template>
                                </div>
                            </template>

                            <template lwc:else>
                                <div class="recurring-empty">
                                    <lightning-icon icon-name="utility:sync" size="small"></lightning-icon>
                                    <span>No recurring expenses for this group</span>
                                </div>
                            </template>
                        </section>
                    </section>
                </template>

            </main>
        </div>
    </div>

    <!-- Print-only content -->
    <div class="print-only">
        <div class="print-header">
            <div class="print-title">Spendly Expense Report</div>
            <div class="print-meta">{printDateRange}</div>
        </div>
        <div class="print-summary">
            <span><strong>Total Spent:</strong> {formattedTotal}</span>
            <span><strong>Expenses:</strong> {expenseCount}</span>
            <span><strong>Average:</strong> {averageExpense}</span>
            <span><strong>Top Category:</strong> {topCategory.name} ({topCategory.amount})</span>
            <span><strong>Top Bank:</strong> {topBank.name} ({topBank.count} txns)</span>
        </div>
        <table class="print-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Expense Name</th>
                    <th>Category</th>
                    <th>Expense Group</th>
                    <th>Bank</th>
                    <th>Type</th>
                    <th class="print-amount-col">Amount (PHP)</th>
                </tr>
            </thead>
            <tbody>
                <template for:each={printRows} for:item="row">
                    <tr key={row.id}>
                        <td>{row.expenseDateFormatted}</td>
                        <td>{row.transactionTimeFormatted}</td>
                        <td>{row.name}</td>
                        <td>{row.category}</td>
                        <td>{row.expenseGroup}</td>
                        <td>{row.bank}</td>
                        <td>{row.transactionType}</td>
                        <td class="print-amount-col">{row.amountFormatted}</td>
                    </tr>
                </template>
            </tbody>
            <tfoot>
                <tr>
                    <td colspan="7" class="print-total-label">Total</td>
                    <td class="print-amount-col print-total-value">{formattedTotal}</td>
                </tr>
            </tfoot>
        </table>
    </div>

    <c-spendly-expense-modal
        is-open={isModalOpen}
        record-id={editRecordId}
        duplicate-data={duplicateData}
        category-options={modalCategoryOptions}
        selected-expense-group-name={selectedExpenseGroupName}
        onsuccess={handleSuccess}
        onclose={handleModalClose}>
    </c-spendly-expense-modal>
</template>
