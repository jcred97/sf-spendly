<template>
    <div class="spendly-page">

        <!-- Top Bar -->
        <div class="top-bar">
            <div class="top-bar-left">
                <lightning-icon icon-name="custom:custom63" size="small"></lightning-icon>
                <span class="top-bar-title">Spendly</span>
            </div>
            <div class="top-bar-right">
                <div class="column-picker-wrapper">
                    <lightning-button
                        variant="neutral"
                        label="Columns"
                        icon-name="utility:table"
                        onclick={handleToggleColumnPicker}>
                    </lightning-button>
                    <template lwc:if={isColumnPickerOpen}>
                        <div class="column-picker">
                            <p class="column-picker-title">Show / Hide Columns</p>
                            <template for:each={columnPickerOptions} for:item="col">
                                <label key={col.key} class="column-picker-item">
                                    <input
                                        type="checkbox"
                                        data-key={col.key}
                                        checked={col.checked}
                                        onchange={handleColumnToggle} />
                                    {col.label}
                                </label>
                            </template>
                        </div>
                    </template>
                </div>
                <lightning-button
                    variant="neutral"
                    label="Export CSV"
                    icon-name="utility:download"
                    onclick={handleExportCsv}
                    disabled={hasNoRows}>
                </lightning-button>
                <lightning-button
                    variant="neutral"
                    label="Print / PDF"
                    icon-name="utility:print"
                    onclick={handlePrint}
                    disabled={hasNoRows}>
                </lightning-button>
                <lightning-button
                    variant="brand"
                    label="Add Expense"
                    icon-name="utility:add"
                    onclick={openModal}>
                </lightning-button>
            </div>
        </div>

        <!-- Filters -->
        <div class="filters-panel">
            <div class="slds-grid slds-gutters_small slds-wrap slds-grid_vertical-align-end">
                <div class="slds-col filter-col">
                    <lightning-input
                        class="date-format-hide"
                        type="date"
                        label="Start Date"
                        value={startDate}
                        onchange={handleChange}
                        data-field="startDate">
                    </lightning-input>
                </div>
                <div class="slds-col filter-col">
                    <lightning-input
                        class="date-format-hide"
                        type="date"
                        label="End Date"
                        value={endDate}
                        onchange={handleChange}
                        data-field="endDate">
                    </lightning-input>
                </div>
                <div class="slds-col filter-col">
                    <lightning-combobox
                        label="Spending"
                        value={spendingId}
                        options={spendingOptions}
                        onchange={handleChange}
                        data-field="spendingId">
                    </lightning-combobox>
                </div>
                <div class="slds-col filter-col">
                    <lightning-combobox
                        label="Category"
                        value={categoryId}
                        options={categoryOptions}
                        onchange={handleChange}
                        data-field="categoryId">
                    </lightning-combobox>
                </div>
                <div class="slds-col search-col">
                    <lightning-input
                        type="search"
                        label="Search"
                        placeholder="Search by name, category, bank..."
                        value={searchTerm}
                        onchange={handleSearch}>
                    </lightning-input>
                </div>
                <div class="slds-col slds-no-flex reset-col">
                    <lightning-button
                        variant="neutral"
                        label="Reset"
                        icon-name="utility:refresh"
                        onclick={handleReset}>
                    </lightning-button>
                </div>
            </div>
            <template lwc:if={dateError}>
                <div class="slds-text-color_error slds-m-top_x-small">{dateError}</div>
            </template>
        </div>

        <!-- Summary Cards -->
        <c-spendly-summary-cards
            formatted-total={formattedTotal}
            expense-count={expenseCount}
            average-expense={averageExpense}
            top-category-name={topCategory.name}
            top-category-amount={topCategory.amount}
            top-bank-name={topBank.name}
            top-bank-count={topBank.count}>
        </c-spendly-summary-cards>

        <!-- Charts Row -->
        <div class="charts-row">
            <c-spendly-bar-chart
                title="By Category"
                chart-data={categoryChartData}>
            </c-spendly-bar-chart>

            <c-spendly-trend-chart
                title="Monthly Trend"
                trend-data={monthlyTrendData}>
            </c-spendly-trend-chart>

            <c-spendly-bar-chart
                title="By Bank"
                chart-data={bankChartData}>
            </c-spendly-bar-chart>
        </div>

        <!-- Table Row -->
        <div class="table-row">
            <div class="table-panel">
                <template lwc:if={hasNoRows}>
                    <div class="empty-state">
                        <lightning-icon icon-name="utility:sentiment_neutral" size="large" class="slds-m-bottom_small"></lightning-icon>
                        <p class="slds-text-heading_small slds-m-top_small">No expenses found</p>
                        <p class="slds-text-body_regular slds-text-color_weak">Try adjusting your filters or add a new expense.</p>
                    </div>
                </template>
                <template lwc:else>
                    <template lwc:if={hasSelectedRows}>
                        <div class="selection-bar">
                            <span class="selection-count">{selectedCount} row(s) selected</span>
                            <lightning-button
                                variant="destructive-text"
                                label="Delete Selected"
                                icon-name="utility:delete"
                                onclick={handleBulkDelete}>
                            </lightning-button>
                        </div>
                    </template>
                    <div class="table-wrap">
                        <lightning-datatable
                            key-field="id"
                            data={rowsToDisplay}
                            columns={columns}
                            selected-rows={selectedRows}
                            sorted-by={sortedBy}
                            sorted-direction={sortedDirection}
                            onsort={handleSort}
                            onrowaction={handleRowAction}
                            onrowselection={handleRowSelection}
                            enable-infinite-loading
                            onloadmore={handleLoadMore}
                            is-loading={isLoading}>
                        </lightning-datatable>
                    </div>
                    <div class="table-footer">
                        <strong>Total: {formattedTotal}</strong>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <!-- Print-only content -->
    <div class="print-only">
        <div class="print-header">
            <div class="print-title">Spendly Expense Report</div>
            <div class="print-meta">{printDateRange}</div>
        </div>
        <div class="print-summary">
            <span><strong>Total Spent:</strong> {formattedTotal}</span>
            <span><strong>Transactions:</strong> {expenseCount}</span>
            <span><strong>Average:</strong> {averageExpense}</span>
            <span><strong>Top Category:</strong> {topCategory.name} ({topCategory.amount})</span>
            <span><strong>Top Bank:</strong> {topBank.name} ({topBank.count} txns)</span>
        </div>
        <table class="print-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Expense Name</th>
                    <th>Category</th>
                    <th>Spending</th>
                    <th>Bank</th>
                    <th>Type</th>
                    <th class="print-amount-col">Amount (PHP)</th>
                </tr>
            </thead>
            <tbody>
                <template for:each={printRows} for:item="row">
                    <tr key={row.id}>
                        <td>{row.expenseDateFormatted}</td>
                        <td>{row.name}</td>
                        <td>{row.category}</td>
                        <td>{row.spending}</td>
                        <td>{row.bank}</td>
                        <td>{row.transactionType}</td>
                        <td class="print-amount-col">{row.amountFormatted}</td>
                    </tr>
                </template>
            </tbody>
            <tfoot>
                <tr>
                    <td colspan="6" class="print-total-label">Total</td>
                    <td class="print-amount-col print-total-value">{formattedTotal}</td>
                </tr>
            </tfoot>
        </table>
    </div>

    <c-spendly-expense-modal
        is-open={isModalOpen}
        record-id={editRecordId}
        duplicate-data={duplicateData}
        onsuccess={handleSuccess}
        onclose={handleModalClose}>
    </c-spendly-expense-modal>
</template>
