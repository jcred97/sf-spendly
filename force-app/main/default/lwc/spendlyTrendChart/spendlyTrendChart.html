<template>
    <div class="chart-panel slds-box slds-theme_default">
        <h3 class="panel-title">{title}</h3>
        <template lwc:if={hasData}>
            <div class="vbar-bars">
                <template for:each={trendData} for:item="item">
                    <div key={item.key} class={item.barClass}>
                        <div class="vbar-value">{item.compactTotal}</div>
                        <div class="vbar-fill" style={item.barStyle}></div>
                    </div>
                </template>
            </div>
            <div class="vbar-labels">
                <template for:each={trendData} for:item="item">
                    <div key={item.key} class="vbar-label">{item.label}</div>
                </template>
            </div>
        </template>
        <template lwc:else>
            <div class="no-data-msg slds-box slds-theme_default">
                <lightning-icon icon-name="utility:chart" size="small"></lightning-icon>
                <span>{emptyMessage}</span>
            </div>
        </template>
    </div>
</template>
